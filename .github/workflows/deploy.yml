name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests configured"

      - name: Wait for SSH and provision server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 30m
          script_timeout: 30m
          request_timeout: 30s
          retry_interval: 15s
          retry_count: 20
          script: |
            # Skip if already provisioned
            if [ -f /opt/hyper-video/.provisioned ]; then
              echo "Already provisioned, skipping"
              exit 0
            fi

            set -e
            echo "=== Provisioning server ==="

            # Update system
            apt-get update && apt-get upgrade -y

            # Install Node.js 22
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs git curl

            # Install Chrome dependencies
            apt-get install -y \
              libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
              libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
              libpango-1.0-0 libcairo2 libasound2t64 libxshmfence1 libatspi2.0-0 \
              libnspr4 fonts-noto-color-emoji fonts-inter xvfb xauth

            # Install Google Chrome
            curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o /tmp/chrome.deb
            dpkg -i /tmp/chrome.deb || apt-get install -f -y
            rm -f /tmp/chrome.deb

            # Install FFmpeg
            apt-get install -y ffmpeg

            # Install nginx
            apt-get install -y nginx

            # Create app user
            useradd -m -s /bin/bash app 2>/dev/null || true

            # Create app directory
            mkdir -p /opt/hyper-video

            # Configure nginx reverse proxy
            cat > /etc/nginx/sites-available/hyper-video << 'NGINX'
            server {
                listen 80;
                server_name _;
                client_max_body_size 10M;
                location / {
                    proxy_pass http://127.0.0.1:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_buffering off;
                    proxy_read_timeout 300s;
                }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/hyper-video /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx

            # Configure firewall
            ufw --force enable
            ufw allow OpenSSH
            ufw allow 'Nginx Full'

            # Mark as provisioned
            date > /opt/hyper-video/.provisioned
            echo "=== Provisioning complete ==="

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "src/,package.json,package-lock.json,public/,templates/"
          target: "/opt/hyper-video"
          strip_components: 0

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 10m
          script_timeout: 10m
          script: |
            set -e
            cd /opt/hyper-video

            # Install production dependencies
            npm ci --omit=dev

            # Create .env file
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            CHROME_PATH=/usr/bin/google-chrome-stable
            ENVEOF
            echo "HYPER_VIDEO_API_KEY=${{ secrets.HYPER_VIDEO_API_KEY }}" >> .env

            # Set ownership
            chown -R app:app /opt/hyper-video

            # Create systemd service if it doesn't exist
            if [ ! -f /etc/systemd/system/hyper-video.service ]; then
              cat > /etc/systemd/system/hyper-video.service << 'SVCEOF'
            [Unit]
            Description=Hyper Video Service (MCP)
            After=network.target

            [Service]
            Type=simple
            User=app
            WorkingDirectory=/opt/hyper-video
            ExecStart=/usr/bin/node src/index.js
            Restart=on-failure
            RestartSec=10
            Environment=NODE_ENV=production
            Environment=PORT=3000
            Environment=CHROME_PATH=/usr/bin/google-chrome-stable
            EnvironmentFile=/opt/hyper-video/.env

            [Install]
            WantedBy=multi-user.target
            SVCEOF
              systemctl daemon-reload
              systemctl enable hyper-video
            fi

            # Restart the service
            systemctl restart hyper-video
            sleep 3
            systemctl status hyper-video --no-pager

      - name: Health check
        run: |
          sleep 5
          curl -sf http://${{ secrets.DO_HOST }}/health || curl -sf http://${{ secrets.DO_HOST }}:3000/health || exit 1
          echo "✅ Health check passed"